<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script type="importmap">
      {
        "imports": {
          "three": "../node_modules/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="c" width="320" height="320"></canvas>
    <script type="module">
      import * as THREE from "three";

      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
      renderer.setSize(320, 320, false);
      const gl = renderer.getContext();

      // Report the actual GPU so we know hardware vs software rasterization.
      function gpuString() {
        const ext = gl.getExtension("WEBGL_debug_renderer_info");
        return ext
          ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)
          : gl.getParameter(gl.RENDERER);
      }

      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
      camera.position.set(0, 0, 3);
      camera.lookAt(0, 0, 0);

      const syncPixel = new Uint8Array(4);
      function forceGpuSync() {
        // readPixels blocks until the GPU has finished the pending draw,
        // so buffer upload + draw cost is captured in the timed region.
        gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, syncPixel);
      }

      function stats(samples) {
        const s = [...samples].sort((a, b) => a - b);
        const at = (q) => s[Math.min(s.length - 1, Math.floor(q * s.length))];
        const mean = s.reduce((a, b) => a + b, 0) / s.length;
        return {
          median: +at(0.5).toFixed(4),
          mean: +mean.toFixed(4),
          p10: +at(0.1).toFixed(4),
          p90: +at(0.9).toFixed(4),
        };
      }

      // Pre-generate a pool of fresh typed arrays so allocation/RNG is NOT in
      // the timed region -- faithful to Viser, where the worker thread hands
      // the main thread a fresh deserialized array each frame. We isolate the
      // *update + upload + draw* delta between the two strategies.
      function makePointPool(n, count) {
        const pool = [];
        for (let k = 0; k < count; k++) {
          const pos = new Float32Array(n * 3);
          const col = new Uint8Array(n * 3);
          for (let i = 0; i < n; i++) {
            pos[i * 3] = (Math.sin(i * 0.13 + k) ) * 0.9;
            pos[i * 3 + 1] = (Math.cos(i * 0.17 + k)) * 0.9;
            pos[i * 3 + 2] = (Math.sin(i * 0.07 + k * 0.5)) * 0.9;
            col[i * 3] = (i + k) & 255;
            col[i * 3 + 1] = (i * 3 + k) & 255;
            col[i * 3 + 2] = (i * 7) & 255;
          }
          pool.push({ pos, col });
        }
        return pool;
      }

      function benchPoints(n, mode, iters, warmup) {
        const pool = makePointPool(n, 8);
        const scene = new THREE.Scene();
        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.BufferAttribute(pool[0].pos, 3));
        geom.setAttribute("color", new THREE.BufferAttribute(pool[0].col, 3, true));
        const mat = new THREE.PointsMaterial({ size: 0.01, vertexColors: true });
        const points = new THREE.Points(geom, mat);
        scene.add(points);

        const samples = [];
        const total = iters + warmup;
        for (let it = 0; it < total; it++) {
          const { pos, col } = pool[it % pool.length];
          const t0 = performance.now();
          if (mode === "recreate") {
            // Current Viser path: new BufferAttribute each update.
            geom.setAttribute("position", new THREE.BufferAttribute(pos, 3));
            geom.setAttribute("color", new THREE.BufferAttribute(col, 3, true));
          } else {
            // In-place: swap backing array on the existing attribute.
            const pa = geom.getAttribute("position");
            pa.array = pos;
            pa.needsUpdate = true;
            const ca = geom.getAttribute("color");
            ca.array = col;
            ca.needsUpdate = true;
          }
          renderer.render(scene, camera);
          forceGpuSync();
          const dt = performance.now() - t0;
          if (it >= warmup) samples.push(dt);
        }
        geom.dispose();
        mat.dispose();
        return stats(samples);
      }

      // Build a grid mesh topology (faces fixed; only vertices move) -- the
      // realistic "deforming mesh" case.
      function makeGridFaces(side) {
        const quads = (side - 1) * (side - 1);
        const faces = new Uint32Array(quads * 6);
        let f = 0;
        for (let y = 0; y < side - 1; y++) {
          for (let x = 0; x < side - 1; x++) {
            const a = y * side + x;
            const b = a + 1;
            const c = a + side;
            const d = c + 1;
            faces[f++] = a; faces[f++] = c; faces[f++] = b;
            faces[f++] = b; faces[f++] = c; faces[f++] = d;
          }
        }
        return faces;
      }
      function makeVertexPool(side, count) {
        const n = side * side;
        const pool = [];
        for (let k = 0; k < count; k++) {
          const v = new Float32Array(n * 3);
          for (let y = 0; y < side; y++) {
            for (let x = 0; x < side; x++) {
              const i = y * side + x;
              v[i * 3] = (x / side - 0.5) * 1.8;
              v[i * 3 + 1] = (y / side - 0.5) * 1.8;
              v[i * 3 + 2] = Math.sin(x * 0.3 + k) * Math.cos(y * 0.3 + k) * 0.3;
            }
          }
          pool.push(v);
        }
        return pool;
      }

      function benchMesh(side, mode, iters, warmup) {
        const faces = makeGridFaces(side);
        const pool = makeVertexPool(side, 8);
        const scene = new THREE.Scene();
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dir = new THREE.DirectionalLight(0xffffff, 1.0);
        dir.position.set(1, 1, 1);
        scene.add(dir);
        const mat = new THREE.MeshStandardMaterial({ color: 0x88aaff });

        let geom = null;
        let mesh = null;
        if (mode !== "recreate") {
          geom = new THREE.BufferGeometry();
          geom.setAttribute("position", new THREE.BufferAttribute(pool[0], 3));
          geom.setIndex(new THREE.BufferAttribute(faces, 1));
          geom.computeVertexNormals();
          geom.computeBoundingSphere();
          mesh = new THREE.Mesh(geom, mat);
          scene.add(mesh);
        }

        const samples = [];
        const total = iters + warmup;
        for (let it = 0; it < total; it++) {
          const v = pool[it % pool.length];
          const t0 = performance.now();
          if (mode === "recreate") {
            // Current Viser BasicMesh path: rebuild the whole geometry.
            if (mesh) scene.remove(mesh);
            if (geom) geom.dispose();
            geom = new THREE.BufferGeometry();
            geom.setAttribute("position", new THREE.BufferAttribute(v, 3));
            geom.setIndex(new THREE.BufferAttribute(faces, 1));
            geom.computeVertexNormals();
            geom.computeBoundingSphere();
            mesh = new THREE.Mesh(geom, mat);
            scene.add(mesh);
          } else {
            // In-place: faces unchanged, swap vertices, recompute normals.
            const pa = geom.getAttribute("position");
            pa.array = v;
            pa.needsUpdate = true;
            geom.computeVertexNormals();
            geom.computeBoundingSphere();
          }
          renderer.render(scene, camera);
          forceGpuSync();
          const dt = performance.now() - t0;
          if (it >= warmup) samples.push(dt);
        }
        return stats(samples);
      }

      // Directly count GPU buffer create/delete to detect leaks from the
      // setAttribute(new BufferAttribute) path.
      window.benchLeak = function (n, mode, iters) {
        let created = 0;
        let deleted = 0;
        const origCreate = gl.createBuffer.bind(gl);
        const origDelete = gl.deleteBuffer.bind(gl);
        gl.createBuffer = () => {
          created++;
          return origCreate();
        };
        gl.deleteBuffer = (b) => {
          deleted++;
          return origDelete(b);
        };

        const pool = makePointPool(n, 8);
        const scene = new THREE.Scene();
        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.BufferAttribute(pool[0].pos, 3));
        geom.setAttribute("color", new THREE.BufferAttribute(pool[0].col, 3, true));
        const mat = new THREE.PointsMaterial({ size: 0.01, vertexColors: true });
        scene.add(new THREE.Points(geom, mat));

        for (let it = 0; it < iters; it++) {
          const { pos, col } = pool[it % pool.length];
          if (mode === "recreate") {
            geom.setAttribute("position", new THREE.BufferAttribute(pos, 3));
            geom.setAttribute("color", new THREE.BufferAttribute(col, 3, true));
          } else {
            const pa = geom.getAttribute("position");
            pa.array = pos; pa.needsUpdate = true;
            const ca = geom.getAttribute("color");
            ca.array = col; ca.needsUpdate = true;
          }
          renderer.render(scene, camera);
          forceGpuSync();
        }
        gl.createBuffer = origCreate;
        gl.deleteBuffer = origDelete;
        const bytesPerUpdate = n * 3 * 4 + n * 3; // pos f32 + col u8
        return {
          n, mode, iters, created, deleted,
          netLeakedBuffers: created - deleted,
          approxLeakedMB: +(((created - deleted) * bytesPerUpdate) / 1e6).toFixed(1),
        };
      };

      window.bench = async function () {
        const results = { gpu: gpuString(), points: [], mesh: [] };
        const pointSizes = [50000, 200000, 1000000];
        for (const n of pointSizes) {
          for (const mode of ["recreate", "inplace"]) {
            results.points.push({ n, mode, ...benchPoints(n, mode, 150, 25) });
            await new Promise((r) => setTimeout(r, 10));
          }
        }
        const meshSides = [64, 160, 320]; // ~4k, 25k, 100k vertices
        for (const side of meshSides) {
          for (const mode of ["recreate", "inplace"]) {
            results.mesh.push({
              n: side * side,
              mode,
              ...benchMesh(side, mode, 120, 20),
            });
            await new Promise((r) => setTimeout(r, 10));
          }
        }
        return results;
      };
      window.__ready = true;
    </script>
  </body>
</html>
